name: Deploy to Lambda

on:
  push:
    branches: [auth-microservice]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Create deploy env file
        run: |
          cat > .env <<EOF
          NODE_ENV=production
          PORT=4100
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          AWS_DEFAULT_REGION=ap-south-1
          COGNITO_USER_POOL_ID=${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID=${{ secrets.COGNITO_CLIENT_ID }}
          AUTH_SESSION_SECRET=${{ secrets.AUTH_SESSION_SECRET }}
          AUTH_OTP_TTL_MINUTES=${{ secrets.AUTH_OTP_TTL_MINUTES }}
          AUTH_OTP_MAX_ATTEMPTS=${{ secrets.AUTH_OTP_MAX_ATTEMPTS }}
          AUTH_OTP_RESEND_COOLDOWN_SECONDS=${{ secrets.AUTH_OTP_RESEND_COOLDOWN_SECONDS }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_SECURE=${{ secrets.SMTP_SECURE }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_FROM_EMAIL=${{ secrets.SMTP_FROM_EMAIL }}
          SMTP_FROM_NAME=${{ secrets.SMTP_FROM_NAME }}
          LOG_LEVEL=${{ secrets.LOG_LEVEL }}
          EOF

      - name: Deploy to Lambda
        run: npx serverless@3 deploy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1
