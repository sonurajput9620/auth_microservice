name: Deploy to Lambda

on:
  push:
    branches: [auth-microservice]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Install Serverless Framework
        run: npm install

      - name: Check for local deploy env
        id: deploy_env
        run: |
          if [ ! -f .env ]; then
            echo "Skipping deploy because this project now expects a local .env file for Serverless variable resolution."
            echo "has_env=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_env=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Lambda
        if: steps.deploy_env.outputs.has_env == 'true'
        run: npx serverless deploy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1
